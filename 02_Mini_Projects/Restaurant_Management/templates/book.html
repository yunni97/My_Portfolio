{% set body_class = "sub_page" %}
{% extends "index.html" %}

{% block rendering_page %}

<h2>신규 매출 등록 화면 입니다.</h2>
<h3>아래의 html 코드 또는 플라스크 폼을 이용해서 메뉴, 판매가격, 판매수량 insert 해주기 <h3>
<div class="row">
    <div class="col-md-6">
        <div class="form_container">  
        <form action="/sales_insert" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <input type="text" name="menuname" class="form-control" placeholder="메뉴명" required /> <!-- placeholder 는 input 태그에 회색글씨로 보여지는 힌트같은 애-->
            </div>
            <div>
                <input type="number" name="price" class="form-control" placeholder="가격" required />
            </div>
            <div>
                <input type="number" name="amount" class="form-control" placeholder="판매수량" required />
            </div>
            <div>
                <input type="text" name="storecode" class="form-control" placeholder="가게코드" required />
            </div>
            <div class = "btn_box">
                <button type="submit"> 매출등록</button>
            </div>
        </form>
        </div>
    </div>
</div>

{% if message %}
<script>
  alert("{{ message }}");
</script>
{% endif %}
