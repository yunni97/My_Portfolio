{% extends 'liverguard/base.html' %}

{% block title %}진료기록 추가 - LiverGuard AI{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h2><i class="bi bi-file-medical-fill"></i> 진료기록 추가</h2>
    </div>
    <div class="col-md-6 text-end">
        <a href="{% url 'liverguard:record_list' %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 취소
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="patient" class="form-label">환자 선택 <span class="text-danger">*</span></label>
                    <select class="form-select" id="patient" name="patient_id" required>
                        <option value="">선택하세요</option>
                        {% for patient in patients %}
                        <option value="{{ patient.patient_id }}">{{ patient.name }} ({{ patient.birth_date }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="visit_date" class="form-label">진료일 <span class="text-danger">*</span></label>
                    <input type="datetime-local" class="form-control" id="visit_date" name="visit_date" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="chief_complaint" class="form-label">주증상</label>
                <input type="text" class="form-control" id="chief_complaint" name="chief_complaint">
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> 저장
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
