{% extends 'liverguard/base.html' %}

{% block title %}환자 추가 - LiverGuard AI{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h2><i class="bi bi-person-plus"></i> 환자 추가</h2>
    </div>
    <div class="col-md-6 text-end">
        <a href="{% url 'liverguard:patient_list' %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 취소
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">이름 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6">
                    <label for="birth_date" class="form-label">생년월일 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="birth_date" name="birth_date" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="sex" class="form-label">성별 <span class="text-danger">*</span></label>
                    <select class="form-select" id="sex" name="sex" required>
                        <option value="">선택하세요</option>
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="phone" class="form-label">연락처 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="01012345678" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="address" class="form-label">주소</label>
                    <input type="text" class="form-control" id="address" name="address">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="resident_number" class="form-label">주민번호</label>
                    <input type="text" class="form-control" id="resident_number" name="resident_number" placeholder="000000-0000000">
                </div>
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> 저장
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
